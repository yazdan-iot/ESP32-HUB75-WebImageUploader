; =============================================================================
;  PlatformIO Project Configuration File for IOT_WebImageUploader
;
;  Two environments are defined:
;    [env:esp32dev]           - classic ESP32 (WROOM/WROVER), matches the
;                                pin defaults already in the .ino. Default.
;    [env:esp32-s3-devkitc-1] - ESP32-S3 boards. Included because it's a
;                                common board people reach for, but read the
;                                warning under that section below before
;                                using it - the pin numbers in the .ino will
;                                NOT work as-is on an S3.
;
;  Run a specific one with:  pio run -e esp32dev
;  or just leave default_envs as-is to build that one by default.
; =============================================================================

[platformio]
default_envs = esp32dev

; ---- Settings shared by both environments ----
[env]
framework = arduino
monitor_speed = 115200
lib_ldf_mode = chain

; Pulling the HUB75 library straight from the GitHub repo you're
; contributing to, rather than by registry name. Reason: the package
; registered on the PlatformIO registry lives under the OLD owner name
; ("mrfaptastic/ESP32 HUB75 LED MATRIX PANEL DMA Display" - yes, with
; spaces in the name), not under the current "mrcodetastic" org the repo
; actually lives at now. Using the direct .git URL sidesteps that mismatch
; entirely and guarantees you're building against the exact repo you're
; sending a PR to.
;
; Adafruit GFX Library is listed explicitly below because the HUB75 driver
; is built on top of it (that's where drawRGBBitmap(), color565(), etc.
; actually come from) but does NOT pull it in automatically - not via
; PlatformIO, not via Arduino IDE either. It's a manual, mandatory
; dependency regardless of install method. Missing it is what caused the
; "Adafruit_GFX.h: No such file or directory" error.
lib_deps =
    https://github.com/mrcodetastic/ESP32-HUB75-MatrixPanel-DMA.git
    adafruit/Adafruit GFX Library
    ESP32Async/ESPAsyncWebServer
    ESP32Async/AsyncTCP
    bodmer/JPEGDecoder

; Not strictly required for this sketch (there's no data/ folder being
; uploaded - see the README), but harmless to set and future-proofs you
; if you ever do want to push static assets into LittleFS later.
board_build.filesystem = littlefs

; ---- Classic ESP32 (default) ----
[env:esp32dev]
platform = espressif32
board = esp32dev

; ---- ESP32-S3 ----
; WARNING before you switch to this one: the HUB75 pin #defines at the top
; of IOT_WebImageUploader.ino (R1_PIN 25, G1_PIN 26, B1_PIN 27, etc.) are
; the library's CLASSIC ESP32 defaults. GPIO25-27 don't exist in the same
; form on the S3 (different pin count/layout, and several S3 pins are
; reserved for flash/PSRAM depending on your module). If you're building
; for an S3 board - including something like an ESP32-S3-N8R2 - you will
; need to pick a fresh set of free GPIOs for the HUB75 pin defines and
; re-check them against your specific board's pinout diagram before
; wiring anything up. Don't just uncomment this and go, basically.
[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
build_flags =
    ; -DARDUINO_USB_MODE=1
    ; -DARDUINO_USB_CDC_ON_BOOT=1